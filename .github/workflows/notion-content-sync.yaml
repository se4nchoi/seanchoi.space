name: Notion Content Sync

on:
  schedule: # everyday at 4:00 AM
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  notion-sync:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      NOTION_INTEGRATION_SECRET: ${{ secrets.NOTION_INTEGRATION_SECRET }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run ts-compile

      - name: Run Notion sync script
        run: node dist/scripts/fetchNotionContent.js
      
      - name: Print generated file content
        run: cat content/your-file-name.mdx
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: Notion content sync" || echo "No changes to commit"
          git push